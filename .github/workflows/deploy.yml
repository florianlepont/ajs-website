name: Build, test, and deploy to GitHub Pages

# Phase 1 staging deploy target (rescoped per 01-CONTEXT.md D-12): OVH's Free
# hosting tier cannot attach a staging subdomain at all, so Phase 1's public
# staging URL is a GitHub Pages project page instead. Production cutover to
# the real OVH-hosted domain is a separate Phase 5 plan, using the SFTP facts
# recorded in 01-02-SUMMARY.md — this workflow deploys ONLY to GitHub Pages.
on:
  push:
    branches: [main]
  repository_dispatch:
    types: [sanity-content-published]

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy should be in flight/queued at a time for GitHub Pages.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Build once WITHOUT the GitHub Pages base path so the existing
      # Playwright/Vitest suite (which asserts root-relative paths like "/"
      # and "/en/", matching local dev) can hard-gate the deploy without
      # needing to know about the deployed base prefix. This build's dist/
      # output is discarded — it exists only to produce a testable artifact.
      # (Astro's `base` only rewrites baked-in href/asset strings; it does
      # not change app behavior, so this build is behaviorally equivalent to
      # the GitHub-Pages-base build produced later in this job.)
      - name: Build (test artifact, root base)
        run: npm run build
        env:
          SANITY_PROJECT_ID: ${{ secrets.SANITY_PROJECT_ID }}
          SANITY_DATASET: ${{ secrets.SANITY_DATASET }}
          SANITY_API_READ_TOKEN: ${{ secrets.SANITY_API_READ_TOKEN }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # BLOCKING gate: a test failure fails the run and prevents deploy.
      - name: Run Playwright e2e tests
        run: npx playwright test

      - name: Run Vitest unit tests
        run: npx vitest run

      # Rebuild WITH the GitHub Pages project-page base path so all baked
      # href/asset URLs in the deployed artifact are subpath-correct. This is
      # the build that actually gets published.
      - name: Build (deploy artifact, GitHub Pages base)
        run: npm run build
        env:
          SANITY_PROJECT_ID: ${{ secrets.SANITY_PROJECT_ID }}
          SANITY_DATASET: ${{ secrets.SANITY_DATASET }}
          SANITY_API_READ_TOKEN: ${{ secrets.SANITY_API_READ_TOKEN }}
          ASTRO_BASE: /ajs-website/

      # WR-04: regression guard for the exact bug class that shipped as
      # CR-01 — a hardcoded root-relative link (unrelated to the switcher
      # utility, so no unit test would catch it) that bypassed the base
      # path entirely. Any bare href="/" or href="/en/" in this base-prefixed
      # build is wrong by construction: every real link on this site must go
      # through an Astro i18n URL helper, which always emits the configured
      # base ("/ajs-website/..." here, never a bare root-relative path).
      - name: Check for un-prefixed links (base-path regression guard)
        run: |
          if grep -rE 'href="/"|href="/en/"' dist/; then
            echo "::error::Found a hardcoded root-relative href that bypasses the GitHub Pages base path (see 01-REVIEW.md CR-01/WR-04). Use an astro:i18n URL helper instead of a literal string." >&2
            exit 1
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
