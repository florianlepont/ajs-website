<!-- @dsCard group="Spacing" viewport="700x200" subtitle="4px-based scale, xs–3xl" name="Spacing Scale" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;font-family:var(--font-sans);padding:20px;box-sizing:border-box;color:var(--color-ink);font-size:12px;}
.row{display:flex;align-items:center;gap:12px;margin-bottom:8px;}
.bar{background:var(--color-accent);height:10px;}
</style></head>
<body>
<div class="row"><div style="width:60px;">xs 4px</div><div class="bar" style="width:4px;"></div></div>
<div class="row"><div style="width:60px;">sm 8px</div><div class="bar" style="width:8px;"></div></div>
<div class="row"><div style="width:60px;">md 16px</div><div class="bar" style="width:16px;"></div></div>
<div class="row"><div style="width:60px;">lg 24px</div><div class="bar" style="width:24px;"></div></div>
<div class="row"><div style="width:60px;">xl 32px</div><div class="bar" style="width:32px;"></div></div>
<div class="row"><div style="width:60px;">2xl 48px</div><div class="bar" style="width:48px;"></div></div>
<div class="row"><div style="width:60px;">3xl 64px</div><div class="bar" style="width:64px;"></div></div>
</body></html>
