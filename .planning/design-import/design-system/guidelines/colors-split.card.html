<!-- @dsCard group="Colors" viewport="700x160" subtitle="Dominant white + accent — Secondary is now merged with white, delineated by a hairline" name="60/30/10 Split" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;font-family:var(--font-sans);}</style></head>
<body>
<div style="display:flex;height:180px;">
  <div style="flex:9;background:var(--color-dominant);display:flex;align-items:flex-end;padding:12px;font-size:12px;color:var(--color-ink);border:1px solid var(--color-border);box-sizing:border-box;">Dominant · #FFFFFF</div>
  <div style="flex:1;background:var(--color-accent);display:flex;align-items:flex-end;padding:12px;font-size:12px;color:var(--color-on-accent);box-sizing:border-box;">Accent</div>
</div>
<div style="padding:10px 0 0 0;font-size:12px;color:#888;">Secondary chrome (header/footer) is now white too — merged with Dominant, delineated by a 1px hairline border instead of a background tint.</div>
</body></html>
